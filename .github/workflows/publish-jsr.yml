name: Publish JSR

on:
  push:
    tags:
      - "*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('deno.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: deno run -A npm:playwright@^1.60.0 install --with-deps chromium

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: deno run -A npm:playwright@^1.60.0 install-deps chromium

      - name: Set version from tag
        run: deno eval "const p='deno.json';await Deno.writeTextFile(p,JSON.stringify(Object.assign(JSON.parse(await Deno.readTextFile(p)),{version:'${{ github.ref_name }}'}),null,2)+'\n')"

      - name: Test
        run: deno test --allow-all --no-check

      - name: Publish dry run
        run: deno publish --allow-dirty --dry-run

      - name: Publish
        run: deno publish --allow-dirty
