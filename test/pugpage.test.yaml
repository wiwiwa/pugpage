render:
  component slot update:
  - goto: /render-test
    has:
      .rest-status: OK
      .counter: "Count: 0"
  - click:
      a: Toggle Slot
    has:
    - render-box
    - p.slot-value: "slot active"
  - click: a.inc
    has:
      .counter: "Count: 1"
  - click:
      a: Toggle Slot
    no: render-box
    has:
      .counter: "Count: 1"
  i18n:
    default language:
    - has:
        "#i18n": Hello Tom
    switch to zh:
    - click: a.lang-zh
      has:
        "#i18n": Tom, 你好
    - fill:
        "#i18n input": XXXX
      has:
        "#value": XXXX
    switch to zh_TW:
    - click: a.lang-zh-tw
      has:
        "#i18n": 確定
        "#value": 当前值
login:
  redirect if not login:
  - goto: /
    url: /login
    has:
      H1: Login
    no: .mainLayout
  wrong password:
  - fill:
      "input[name=username]": demo
      "input[name=password]": demo1
    click: {button: Login}
    has:
      p.error: Invalid
  login successfully:
  - fill:
      "input[name=password]": demo
    click: {button: Login}
    has: .logout
  logout:
  - click: .logout
home:
- fill:
    "input[name=username]": demo
    "input[name=password]": demo
  click: "button[type=submit]"
  url: /
- has:
    h1: Hello
user:
  show user:
  - goto: /user/1000
    has:
      li: demo
    no: user-edit
  - has:
      nav.breadcrumb a: demo
  - click:
      a: Edit
    has: user-edit
  - click:
      nav.breadcrumb a: PugPage
    no:
      nav.breadcrumb a: demo