render:
  component slot update:
  - goto: /render-test
  - has:
      .rest-status: OK
  - has:
      p.counter: "Count: 0"
  - click:
      a: Toggle Slot
  - has:
    - render-box
    - p.slot-value: "slot active"
  - click: a.inc
  - has:
      p.counter: "Count: 1"
  - click:
      a: Toggle Slot
  - no: render-box
  - has:
      p.counter: "Count: 1"
  - click: a.inc
  - has:
      p.counter: "Count: 2"
login:
  redirect if not login:
  - goto: /
    url: /login
    has:
      H1: Login
    no: .mainLayout
  wrong password:
  - fill:
      "input[name=username]": demo
      "input[name=password]": demo1
    click: {button: Login}
    has:
      p.error: Invalid
  login successfully:
  - fill:
      "input[name=password]": demo
    click: {button: Login}
    has: .logout
  logout:
  - click: .logout
home:
- fill:
    "input[name=username]": demo
    "input[name=password]": demo
  click: "button[type=submit]"
  url: /
- has:
    h1: Hello
user:
  show user:
  - goto: /user/1000
    has:
      li: demo
    no: user-edit
  - js: document.title