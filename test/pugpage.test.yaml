login:
  redirect if not login:
  - goto: /
    url: /login
    has:
      H1: Login
    no: .mainLayout
  wrong password:
  - fill:
      "input[name=username]": demo
      "input[name=password]": demo1
    click: {button: Login}
    has:
      p.error: Invalid
  login successfully:
  - fill:
      "input[name=password]": demo
    click: {button: Login}
    has: .logout
  logout:
  - click: .logout
home:
- fill:
    "input[name=username]": demo
    "input[name=password]": demo
  click: "button[type=submit]"
  url: /
- has:
    h1: Hello
user:
  show user:
  - goto: /user/1000
    has:
      li: demo
    no: user-edit
  edit user in dialog:
  - click:
      a: Edit
    has:
    - page-dialog
    - div.user-edit
    - h3: Edit User
    - a.close-btn: X
  - click: a.close-btn
    no:
      div.user-edit